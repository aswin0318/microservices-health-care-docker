syntax = "proto3";

message Doctor {
  string id = 1;
  string payload = 2;
}

message DoctorList {
  repeated Doctor doctors = 1;
}

message DoctorRequest {
  optional string id = 1;
  optional string payload = 2;
}

service DoctorService {
  rpc AffiliateDoctor (Doctor) returns (Doctor);
  rpc GetDoctor (Doctor) returns (Doctor);
  rpc GetAllDoctors (DoctorRequest) returns (DoctorList);
  rpc GetDoctorById (DoctorRequest) returns (Doctor);
}
